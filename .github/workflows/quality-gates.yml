name: quality-gates

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Install WeChat bridge deps
        working-directory: wechat-bridge
        run: npm install
      - name: Unit tests
        run: PYTHONPATH=. pytest -q
      - name: WeChat bridge tests
        working-directory: wechat-bridge
        run: npm test
      - name: Quality gates
        run: python scripts/quality_gates.py
