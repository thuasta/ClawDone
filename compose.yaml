services:
  clawdone:
    build:
      context: .
      target: runtime
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.13-slim}
    image: clawdone:latest
    ports:
      - "${CLAWDONE_PORT:-8787}:8787"
    environment:
      CLAWDONE_HOST: 0.0.0.0
      CLAWDONE_PORT: 8787
      CLAWDONE_STORE: /data/profiles.json
      CLAWDONE_TOKEN: ${CLAWDONE_TOKEN:-}
      CLAWDONE_HOST_KEY_POLICY: ${CLAWDONE_HOST_KEY_POLICY:-strict}
      CLAWDONE_SSH_TIMEOUT: ${CLAWDONE_SSH_TIMEOUT:-10}
      CLAWDONE_SSH_COMMAND_TIMEOUT: ${CLAWDONE_SSH_COMMAND_TIMEOUT:-15}
      CLAWDONE_SSH_RETRIES: ${CLAWDONE_SSH_RETRIES:-0}
      CLAWDONE_SSH_RETRY_BACKOFF_MS: ${CLAWDONE_SSH_RETRY_BACKOFF_MS:-250}
      CLAWDONE_DASHBOARD_WORKERS: ${CLAWDONE_DASHBOARD_WORKERS:-6}
    volumes:
      - clawdone-data:/data
    restart: unless-stopped

volumes:
  clawdone-data:
